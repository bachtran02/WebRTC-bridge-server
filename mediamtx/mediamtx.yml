paths:
  all:
    source: publisher

# Enable HLS as Egress source
hls: yes
hlsAddress: :8888

# Enable WebRTC as Ingress source
webrtc: yes
webrtcAddress: :8889
webrtcEncryption: no
webrtcHandshakeTimeout: 15s

# Disable other protocols
rtsp: no
rtmp: no
srt: no

api: yes

authInternalUsers:
  - user: any
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api

# logLevel: debug