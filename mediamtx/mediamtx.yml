paths:
  all:
    source: publisher

    # TODO: replace this with env vars
    # runOnDemand: curl -X POST http://127.0.0.1:8080/mtx/start?id=$MTX_PATH
    # runOnUnDemand: curl -X DELETE http://127.0.0.1:8080/mtx/stop?id=$MTX_PATH
    runOnUnDemand: curl -X DELETE http://lavaradio:8080/mtx/stop?id=$MTX_PATH

# Enable HLS as Egress source
hls: yes
hlsAddress: :8888

# Use lowLatency to prevent the player from dropping quality due to buffer lag
hlsVariant: lowLatency 
hlsSegmentCount: 10
hlsSegmentDuration: 2s
hlsPartDuration: 200ms

# Enable WebRTC as Ingress source
webrtc: yes
webrtcAddress: :8889
webrtcEncryption: no
webrtcHandshakeTimeout: 15s

# Disable other protocols
rtsp: no
rtmp: no
srt: no

# logLevel: debug